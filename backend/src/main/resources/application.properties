spring.application.name=translog-backend
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/transportadora
spring.datasource.username=postgres
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Usuário inicial (somente se a tabela estiver vazia)
app.seed.enabled=true
app.seed.email=admin@translog.com.br
app.seed.login=admin
app.seed.nome=Administrador
app.seed.senha=123456

# Corrige hash incorreto no banco (ex.: INSERT manual com hash de exemplo). Desative após o login funcionar.
app.auth.sync-password-on-startup=true
app.auth.sync-password.email=fcunha326@gmail.com
app.auth.sync-password.plain=123456

app.upload.avatars-dir=data/avatars
app.upload.max-avatar-mb=25

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=32MB
spring.servlet.multipart.max-request-size=40MB
server.tomcat.max-http-form-post-size=45MB
server.tomcat.max-swallow-size=45MB
