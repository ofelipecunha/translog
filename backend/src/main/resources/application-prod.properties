# Perfil prod (Render). Variáveis vêm do painel Environment do Render.
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.show-sql=false

app.seed.enabled=${APP_SEED_ENABLED:true}
app.auth.sync-password-on-startup=false

# CORS: localhost + qualquer deploy Vercel (*.vercel.app). Separe por vírgula.
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:4200,https://*.vercel.app}
