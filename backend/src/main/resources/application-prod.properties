# Perfil prod (Render). Variáveis vêm do painel Environment do Render.
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.show-sql=false

app.seed.enabled=${APP_SEED_ENABLED:true}
app.auth.sync-password-on-startup=false

# Origens do frontend (Vercel). Separe por vírgula.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://translog-orpin.vercel.app,http://localhost:4200}
