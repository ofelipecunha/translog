@if (alerts().length) {
  <div
    class="pointer-events-none fixed top-20 right-4 z-[100050] flex w-full max-w-md flex-col gap-3 md:right-6"
    aria-live="polite"
    aria-label="Notificações"
  >
    @for (alert of alerts(); track alert.id) {
      <div class="pointer-events-auto relative shadow-theme-md">
        <app-alert
          [variant]="alert.variant"
          [title]="alert.title"
          [message]="alert.message"
          [showLink]="false"
        />
        <button
          type="button"
          (click)="dismiss(alert.id)"
          class="absolute top-3 right-3 inline-flex size-7 items-center justify-center rounded-md text-gray-500 hover:bg-gray-100 hover:text-gray-800 dark:text-gray-400 dark:hover:bg-white/10 dark:hover:text-white/90"
          [attr.aria-label]="'Fechar alerta: ' + alert.title"
        >
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path
              d="M10.5 3.5L3.5 10.5M3.5 3.5L10.5 10.5"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
      </div>
    }
  </div>
}
