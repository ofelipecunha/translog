<div class="flex h-full flex-col rounded-2xl border border-gray-200 bg-white px-5 pb-5 pt-5 dark:border-gray-800 dark:bg-white/[0.03] sm:px-6 sm:pt-6">
  <div class="mb-4">
    <h3 class="text-lg font-semibold text-gray-800 dark:text-white/90">
      Meta de entregas
    </h3>
    <p class="mt-1 text-theme-sm text-gray-500 dark:text-gray-400">
      Acompanhamento do volume mensal de entregas concluídas
    </p>
  </div>

  <div class="flex flex-1 flex-col justify-center">
    <apx-chart
      [series]="series"
      [chart]="chart"
      [plotOptions]="plotOptions"
      [fill]="fill"
      [stroke]="stroke"
      [labels]="labels"
      [colors]="colors"
      [legend]="legend"
    ></apx-chart>
  </div>

  <div class="mt-auto grid grid-cols-2 gap-4 border-t border-gray-100 pt-4 dark:border-gray-800">
    <div>
      <p class="text-theme-xs text-gray-500 dark:text-gray-400">Realizadas</p>
      <p class="mt-1 text-lg font-semibold text-gray-800 dark:text-white/90">{{ entregasRealizadas }}</p>
    </div>
    <div>
      <p class="text-theme-xs text-gray-500 dark:text-gray-400">Meta</p>
      <p class="mt-1 text-lg font-semibold text-gray-800 dark:text-white/90">{{ metaMensal }}</p>
    </div>
  </div>
</div>
