<div class="grid grid-cols-1 gap-3 sm:grid-cols-2 md:gap-4 lg:grid-cols-3 xl:grid-cols-5 xl:gap-3">
  @for (metric of metrics; track metric.label) {
    <div
      class="min-w-0 rounded-2xl border border-gray-200 bg-white p-3 dark:border-gray-800 dark:bg-white/[0.03]"
    >
      <div class="flex items-center gap-2">
        <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-xl bg-orange-50 dark:bg-orange-500/10">
          <span class="flex items-center justify-center" [innerHTML]="metric.icon | safeHtml"></span>
        </div>

        <div class="flex min-w-0 flex-1 items-center justify-between gap-1.5">
          <div class="min-w-0">
            <span class="block truncate text-[11px] leading-tight text-gray-500 dark:text-gray-400">{{ metric.label }}</span>
            <h4 class="mt-0.5 truncate font-bold text-gray-800 text-title-sm dark:text-white/90">
              {{ metric.value }}
            </h4>
          </div>

          <app-badge [color]="metric.trend === 'up' ? 'success' : 'error'" size="sm">
            {{ metric.change }}
          </app-badge>
        </div>
      </div>
    </div>
  }
</div>
