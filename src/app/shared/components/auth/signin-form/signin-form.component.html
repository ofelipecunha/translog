<div class="w-full">
  <div
    class="rounded-2xl border border-gray-200/80 bg-white p-6 shadow-xl shadow-gray-200/50 sm:p-8 dark:border-white/10 dark:bg-gray-900/80 dark:shadow-none dark:backdrop-blur-sm"
  >
    <div class="mb-8 flex w-full justify-center">
      <img
        class="h-auto max-h-60 w-auto max-w-full object-contain dark:hidden sm:max-h-72"
        src="/images/logo_new_black.png"
        alt="TransLog Transportadora"
      />
      <img
        class="hidden h-auto max-h-60 w-auto max-w-full object-contain dark:block sm:max-h-72"
        src="/images/logo_new.png"
        alt="TransLog Transportadora"
      />
    </div>

    <form (ngSubmit)="onSignIn()" class="space-y-5">
      <div>
        <app-label>E-mail <span class="text-error-500">*</span></app-label>
        <div class="relative mt-1.5">
          <span
            class="pointer-events-none absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500"
            aria-hidden="true"
          >
            <svg class="size-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path
                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </span>
          <input
            type="email"
            name="email"
            autocomplete="username"
            placeholder="seu@email.com"
            [(ngModel)]="email"
            (ngModelChange)="onFieldInput()"
            required
            class="form-input h-12 w-full rounded-xl border border-gray-300 bg-gray-50/50 pl-11 pr-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 transition-colors focus:border-brand-400 focus:bg-white focus:outline-hidden focus:ring-4 focus:ring-brand-500/15 dark:border-gray-700 dark:bg-gray-800/50 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-600 dark:focus:bg-gray-900 dark:focus:ring-brand-500/20"
          />
        </div>
      </div>

      <div>
        <app-label>Senha <span class="text-error-500">*</span></app-label>
        <div class="relative mt-1.5">
          <span
            class="pointer-events-none absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500"
            aria-hidden="true"
          >
            <svg class="size-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </span>
          <input
            [type]="showPassword ? 'text' : 'password'"
            name="password"
            autocomplete="current-password"
            placeholder="Digite sua senha"
            [(ngModel)]="password"
            (ngModelChange)="onFieldInput()"
            required
            [class.border-error-400]="passwordIncorrect"
            [class.focus:border-error-400]="passwordIncorrect"
            [class.focus:ring-error-500/20]="passwordIncorrect"
            class="form-input h-12 w-full rounded-xl border border-gray-300 bg-gray-50/50 pl-11 pr-12 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 transition-colors focus:border-brand-400 focus:bg-white focus:outline-hidden focus:ring-4 focus:ring-brand-500/15 dark:border-gray-700 dark:bg-gray-800/50 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-600 dark:focus:bg-gray-900 dark:focus:ring-brand-500/20"
          />
          <button
            type="button"
            (click)="togglePasswordVisibility()"
            class="absolute right-3 top-1/2 -translate-y-1/2 rounded-lg p-1 text-gray-400 transition-colors hover:bg-gray-100 hover:text-gray-600 dark:hover:bg-white/10 dark:hover:text-gray-300"
            [attr.aria-label]="showPassword ? 'Ocultar senha' : 'Mostrar senha'"
          >
            @if (showPassword) {
              <svg class="size-5" viewBox="0 0 20 20" fill="currentColor">
                <path
                  fill-rule="evenodd"
                  clip-rule="evenodd"
                  d="M10.0002 13.8619C7.23361 13.8619 4.86803 12.1372 3.92328 9.70241C4.86804 7.26761 7.23361 5.54297 10.0002 5.54297C12.7667 5.54297 15.1323 7.26762 16.0771 9.70243C15.1323 12.1372 12.7667 13.8619 10.0002 13.8619ZM10.0002 4.04297C6.48191 4.04297 3.49489 6.30917 2.4155 9.4593C2.3615 9.61687 2.3615 9.78794 2.41549 9.94552C3.49488 13.0957 6.48191 15.3619 10.0002 15.3619C13.5184 15.3619 16.5055 13.0957 17.5849 9.94555C17.6389 9.78797 17.6389 9.6169 17.5849 9.45932C16.5055 6.30919 13.5184 4.04297 10.0002 4.04297ZM9.99151 7.84413C8.96527 7.84413 8.13333 8.67606 8.13333 9.70231C8.13333 10.7286 8.96527 11.5605 9.99151 11.5605H10.0064C11.0326 11.5605 11.8646 10.7286 11.8646 9.70231C11.8646 8.67606 11.0326 7.84413 10.0064 7.84413H9.99151Z"
                />
              </svg>
            } @else {
              <svg class="size-5" viewBox="0 0 20 20" fill="currentColor">
                <path
                  fill-rule="evenodd"
                  clip-rule="evenodd"
                  d="M4.63803 3.57709C4.34513 3.2842 3.87026 3.2842 3.57737 3.57709C3.28447 3.86999 3.28447 4.34486 3.57737 4.63775L4.85323 5.91362C3.74609 6.84199 2.89363 8.06395 2.4155 9.45936C2.3615 9.61694 2.3615 9.78801 2.41549 9.94558C3.49488 13.0957 6.48191 15.3619 10.0002 15.3619C11.255 15.3619 12.4422 15.0737 13.4994 14.5598L15.3625 16.4229C15.6554 16.7158 16.1302 16.7158 16.4231 16.4229C16.716 16.13 16.716 15.6551 16.4231 15.3622L4.63803 3.57709ZM12.3608 13.4212L10.4475 11.5079C10.3061 11.5423 10.1584 11.5606 10.0064 11.5606H9.99151C8.96527 11.5606 8.13333 10.7286 8.13333 9.70237C8.13333 9.5461 8.15262 9.39434 8.18895 9.24933L5.91885 6.97923C5.03505 7.69015 4.34057 8.62704 3.92328 9.70247C4.86803 12.1373 7.23361 13.8619 10.0002 13.8619C10.8326 13.8619 11.6287 13.7058 12.3608 13.4212ZM16.0771 9.70249C15.7843 10.4569 15.3552 11.1432 14.8199 11.7311L15.8813 12.7925C16.6329 11.9813 17.2187 11.0143 17.5849 9.94561C17.6389 9.78803 17.6389 9.61696 17.5849 9.45938C16.5055 6.30925 13.5184 4.04303 10.0002 4.04303C9.13525 4.04303 8.30244 4.17999 7.52218 4.43338L8.75139 5.66259C9.1556 5.58413 9.57311 5.54303 10.0002 5.54303C12.7667 5.54303 15.1323 7.26768 16.0771 9.70249Z"
                />
              </svg>
            }
          </button>
        </div>
        @if (passwordIncorrect) {
          <p class="mt-2 text-sm text-error-500" role="alert">Senha incorreta. Tente novamente.</p>
        }
      </div>

      <app-checkbox [(checked)]="isChecked" label="Manter conectado" />

      @if (loginError && !passwordIncorrect) {
        <div
          class="flex items-start gap-3 rounded-xl border border-error-200 bg-error-50 px-4 py-3 dark:border-error-500/30 dark:bg-error-500/10"
          role="alert"
        >
          <svg class="mt-0.5 size-5 shrink-0 text-error-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path
              d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <p class="text-sm text-error-700 dark:text-error-400">{{ loginError }}</p>
        </div>
      }

      <app-button
        className="w-full !rounded-xl !py-3.5 font-semibold shadow-lg shadow-brand-500/25"
        size="sm"
        buttonType="submit"
        [disabled]="submitting"
      >
        {{ submitting ? 'Entrando...' : 'Entrar no sistema' }}
      </app-button>
    </form>

    <div class="mt-8 border-t border-gray-100 pt-6 dark:border-white/10">
      <p class="text-center text-sm text-gray-600 dark:text-gray-400">
        Não tem uma conta?
        <span class="font-semibold text-brand-600 dark:text-brand-400">Cadastre-se</span>
      </p>
    </div>
  </div>
</div>
