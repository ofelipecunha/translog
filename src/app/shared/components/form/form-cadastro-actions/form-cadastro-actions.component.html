<div class="flex flex-wrap items-stretch justify-start gap-2">
  <button
    type="button"
    (click)="cancelar.emit()"
    [disabled]="cancelDisabled"
    class="shadow-theme-xs flex min-w-[4.5rem] flex-col items-center justify-center gap-1 rounded-lg bg-white px-3 py-2.5 text-xs font-semibold text-brand-500 transition hover:bg-brand-50 disabled:cursor-not-allowed disabled:opacity-60 dark:bg-white/[0.03] dark:hover:bg-brand-500/10"
  >
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path
        d="M18 6L6 18M6 6L18 18"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>
    <span>Cancelar</span>
  </button>
  <button
    type="button"
    (click)="salvar.emit()"
    [disabled]="salvarDisabled"
    class="shadow-theme-xs flex min-w-[4.5rem] flex-col items-center justify-center gap-1 rounded-lg bg-brand-500 px-3 py-2.5 text-xs font-semibold text-white transition hover:bg-brand-600 disabled:cursor-not-allowed disabled:opacity-60"
  >
    @if (salvando) {
      <span class="text-[11px] font-medium">Salvando…</span>
    } @else {
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path
          d="M20 7L10.5 16.5L5 11"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
      <span>Salvar</span>
    }
  </button>
</div>
